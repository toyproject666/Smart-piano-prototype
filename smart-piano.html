<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Smart Piano</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --panel: #16161a;
      --border: #2a2a35;
      --accent: #e8c97e;
      --accent2: #7eb8e8;
      --accent3: #b87ee8;
      --accent4: #7ee8b8;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      gap: 24px;
    }
    h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
    }
    /* Timbre selector */
    .timbre-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .timbre-btn {
      background: var(--panel);
      border: 1.5px solid var(--border);
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 99px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.15s;
    }
    .timbre-btn:hover { border-color: var(--accent); color: var(--accent); }
    .timbre-btn.active {
      background: var(--accent);
      color: #0d0d0f;
      border-color: var(--accent);
      font-weight: 700;
    }
    /* Layout */
    .main-layout {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 880px;
    }
    /* Chord panel */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .panel h3 {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .chord-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .chord-key {
      background: #1e1e26;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      transition: all 0.1s;
      cursor: default;
    }
    .chord-key.pressed {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d0f;
      transform: scale(0.96);
    }
    .chord-key .key-label {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      display: block;
    }
    .chord-key .chord-name {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .chord-key.pressed .chord-name { color: #0d0d0f99; }

    /* Melody panel */
    .melody-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .melody-key.black-key {
      background: #111118;
      border-color: #444;
    }
    .melody-key.black-key .note-name { color: var(--accent3); }
    .melody-key.black-key.pressed {
      background: var(--accent3);
      border-color: var(--accent3);
    }
    .melody-key {
      background: #1e1e26;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 6px;
      text-align: center;
      transition: all 0.1s;
      cursor: default;
    }
    .melody-key.pressed {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #0d0d0f;
      transform: scale(0.96);
    }
    .melody-key .key-label {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      display: block;
    }
    .melody-key .note-name {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .melody-key.pressed .note-name { color: #0d0d0f99; }

    /* Visualizer */
    #visualizer {
      width: 100%;
      max-width: 880px;
      height: 80px;
      border-radius: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      display: block;
    }

    /* Status */
    .status-bar {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .status-bar span { color: var(--accent); }

    /* Start button */
    #startBtn {
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 99px;
      padding: 12px 36px;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #startBtn:hover { opacity: 0.85; }
    #startBtn:disabled { opacity: 0.3; cursor: default; }

    .octave-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
    }
    .octave-btn {
      background: var(--panel);
      border: 1.5px solid var(--border);
      color: var(--text);
      width: 36px; height: 36px;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .octave-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    #octaveDisplay { color: var(--accent2); min-width: 24px; text-align: center; }
    #sustainIndicator { color: var(--muted); transition: color 0.1s; }
    #sustainIndicator.on { color: #7ee8b8; }
    .hint {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }
  </style>
</head>
<body>

<h1>⬡ Smart Piano</h1>

<button id="startBtn">▶ 启动声音</button>

<!-- Timbre selector -->
<div class="timbre-bar" id="timbreBar">
  <button class="timbre-btn active" data-timbre="piano">🎹 钢琴</button>
  <button class="timbre-btn" data-timbre="guitar">🎸 吉他</button>
  <button class="timbre-btn" data-timbre="electric">⚡ 电吉他</button>
  <button class="timbre-btn" data-timbre="flute">🎵 长笛</button>
  <button class="timbre-btn" data-timbre="organ">🎺 风琴</button>
  <button class="timbre-btn" data-timbre="marimba">🪘 木琴</button>
  <button class="timbre-btn" data-timbre="strings">🎻 弦乐</button>
  <button class="timbre-btn" data-timbre="synth">🌀 合成器</button>
</div>

<div class="octave-bar">
  <button class="octave-btn" id="octaveDown">,</button>
  <span>八度 <span id="octaveDisplay">0</span></span>
  <button class="octave-btn" id="octaveUp">.</button>
</div>

<canvas id="visualizer"></canvas>

<div class="main-layout">
  <!-- Left hand chords -->
  <div class="panel">
    <h3>左手 · 和弦</h3>
    <div class="chord-grid" id="chordGrid"></div>
  </div>
  <!-- Right hand melody -->
  <div class="panel">
    <h3>右手 · 旋律</h3>
    <div class="melody-grid" id="melodyGrid"></div>
  </div>
</div>

<div class="status-bar" id="statusBar">和弦: <span id="chordDisplay">—</span> &nbsp;|&nbsp; 音色: <span id="timbreDisplay">钢琴</span> &nbsp;|&nbsp; 延音: <span id="sustainIndicator">OFF</span></div>

<div class="hint">
  左手 C D E F G A B = 大和弦 &nbsp;·&nbsp; S = 小和弦 &nbsp;·&nbsp; Q = 属七 &nbsp;·&nbsp; M = 扫弦<br>
  右手白键 H J K L ; ' ↵ = Do Re Mi Fa So La Xi &nbsp;·&nbsp; 黑键 U I P [ ] = #Do #Re #Fa #So #La &nbsp;·&nbsp; O = 高音Do<br>
  空格 = 延音 &nbsp;·&nbsp; 按钮 . / , = 升/降八度
</div>

<script>
let audioCtx;
let analyser, analyserData;
let currentChord = null;
let currentTimbre = 'piano';
let octaveShift = 0; // -1, 0, +1

// Full note frequency table (octave 0 = middle octave base)
// We store base frequencies and apply octaveShift multiplier at play time
const baseFreqs = {
  C:261.63, Cs:277.18, D:293.66, Ds:311.13,
  E:329.63, F:349.23, Fs:369.99, G:392.00,
  Gs:415.30, A:440.00, As:466.16, B:493.88
};

function freq(note) {
  return baseFreqs[note] * Math.pow(2, octaveShift);
}
function bassFreq(f) {
  // bass always one octave below current octave
  return f * Math.pow(2, octaveShift - 1);
}

// Right hand key → note name
// White keys: H J K L ; ' Enter
// Black keys: U I P [ ]
// High C: O
const rightKeys = {
  h:"C", j:"D", k:"E", l:"F", ";":"G", "'":"A", "Enter":"B",
  u:"Cs", i:"Ds", p:"Fs", "[":"Gs", "]":"As",
  o:"C_hi"  // high C = one octave above current
};

// Chord definitions: major & minor for each root
// snap: for each white+black note, which chord tones to snap to
// We define snap in terms of scale-degree names, resolve at play time
function makeChord(root, quality) {
  // intervals in semitones
  const intervals = quality === 'major' ? [0,4,7] : quality === 'minor' ? [0,3,7] : quality === 'dom7' ? [0,4,7,10] : [0,3,6];
  const noteNames = Object.keys(baseFreqs);
  const rootIdx = noteNames.indexOf(root);
  const tones = intervals.map(i => noteNames[(rootIdx + i) % 12]);
  // snap: for every playable note, find closest chord tone
  const allPlayable = ["C","Cs","D","Ds","E","F","Fs","G","Gs","A","As","B","C_hi"];
  const snap = {};
  allPlayable.forEach(note => {
    const n = note === "C_hi" ? "C" : note;
    const nIdx = noteNames.indexOf(n);
    let bestDist = 99;
    tones.forEach(t => {
      const tIdx = noteNames.indexOf(t);
      const dist = Math.min(Math.abs(tIdx - nIdx), 12 - Math.abs(tIdx - nIdx));
      if (dist < bestDist) bestDist = dist;
    });
    const best = tones.filter(t => {
      const tIdx = noteNames.indexOf(t);
      const dist = Math.min(Math.abs(tIdx - nIdx), 12 - Math.abs(tIdx - nIdx));
      return dist === bestDist;
    });
    if (note === "C_hi") {
      snap[note] = best.map(t => t + "_hi");
    } else {
      snap[note] = best;
    }
  });
  const bassNote = root;
  const name = root + (quality === 'major' ? '' : quality === 'minor' ? 'm' : quality === 'dom7' ? '7' : 'dim');
  return { name, tones, snap, bassNote };
}

// Left hand chord keys: A B C D E F G (major) + S modifier = minor
// Key mapping: a=C, b=... wait, use letter keys for roots
// a=C, z=D, x=E, c=F, v=G, b=A, n=B  -- but user said C->C key etc
// User specified: C key -> C chord, D key -> D chord ... 
// But C/D/E/F/G/A/B are also used by OS or other things — use lowercase
// Keys: c, d, e, f, g, a, b  (+ s held = minor)
const chordRoots = { c:"C", d:"D", e:"E", f:"F", g:"G", a:"A", b:"B" };

const timbreNames = {piano:"钢琴", guitar:"吉他", electric:"电吉他", flute:"长笛", organ:"风琴", marimba:"木琴", strings:"弦乐", synth:"合成器"};

// Track held keys for S-modifier chord detection
const heldKeys = new Set();
let sHeld = false;
let altHeld = false;

// Build chord UI
const chordKeys = ['c','d','e','f','g','a','b'];
const chordGrid = document.getElementById('chordGrid');
chordKeys.forEach(k => {
  const maj = makeChord(chordRoots[k], 'major');
  const min = makeChord(chordRoots[k], 'minor');
  const el = document.createElement('div');
  el.className = 'chord-key';
  el.id = 'chord-'+k;
  el.innerHTML = `<span class="key-label">${k.toUpperCase()}</span><span class="chord-name" id="chord-name-${k}">${maj.name}</span>`;
  chordGrid.appendChild(el);
});

// Build melody UI
const melodyKeyOrder = ['h','j','k','l',';',"'",'Enter','u','i','p','[',']','o'];
const melodyDisplayNames = {
  h:"Do", j:"Re", k:"Mi", l:"Fa", ";":"So", "'":"La", "Enter":"Xi",
  u:"#Do", i:"#Re", p:"#Fa", "[":"#So", "]":"#La",
  o:"Do↑"
};
const melodyGrid = document.getElementById('melodyGrid');
melodyKeyOrder.forEach(k => {
  const el = document.createElement('div');
  el.className = 'melody-key' + (["u","i","p","[","]"].includes(k) ? " black-key" : "");
  el.id = 'melody-'+k.replace(/[^a-zA-Z0-9]/g, c => c.charCodeAt(0));
  el.innerHTML = `<span class="key-label">${k === 'Enter' ? '↵' : k}</span><span class="note-name">${melodyDisplayNames[k]}</span>`;
  melodyGrid.appendChild(el);
});

function getMelodyEl(k) {
  return document.getElementById('melody-'+k.replace(/[^a-zA-Z0-9]/g, c => c.charCodeAt(0)));
}

document.getElementById('startBtn').addEventListener('click', function() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  analyserData = new Uint8Array(analyser.frequencyBinCount);
  analyser.connect(audioCtx.destination);
  this.disabled = true;
  this.textContent = '✓ 已启动';
  drawVisualizer();
});

// Octave buttons
document.getElementById('octaveUp').addEventListener('click', () => {
  if (octaveShift < 2) { octaveShift++; updateOctaveDisplay(); }
});
document.getElementById('octaveDown').addEventListener('click', () => {
  if (octaveShift > -2) { octaveShift--; updateOctaveDisplay(); }
});
function updateOctaveDisplay() {
  const s = octaveShift > 0 ? '+'+octaveShift : octaveShift === 0 ? '0' : String(octaveShift);
  document.getElementById('octaveDisplay').textContent = s;
}

// Timbre buttons
document.getElementById('timbreBar').addEventListener('click', e => {
  const btn = e.target.closest('.timbre-btn');
  if (!btn) return;
  document.querySelectorAll('.timbre-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTimbre = btn.dataset.timbre;
  document.getElementById('timbreDisplay').textContent = timbreNames[currentTimbre];
});

// ---- Sound synthesis per timbre ----
function createOscWithType(f, type, detune=0) {
  const osc = audioCtx.createOscillator();
  osc.frequency.value = f;
  osc.type = type;
  osc.detune.value = detune;
  return osc;
}

function playNote(frequency, duration, volume) {
  if (!audioCtx) return;
  const out = analyser;
  const now = audioCtx.currentTime;

  switch(currentTimbre) {

    case 'piano': {
      const gain = audioCtx.createGain();
      gain.connect(out);
      const osc1 = createOscWithType(frequency, 'sine');
      const osc2 = createOscWithType(frequency * 2, 'sine');
      const osc3 = createOscWithType(frequency * 3, 'triangle');
      const g1 = audioCtx.createGain(); g1.gain.value = 0.5;
      const g2 = audioCtx.createGain(); g2.gain.value = 0.2;
      const g3 = audioCtx.createGain(); g3.gain.value = 0.07;
      osc1.connect(g1); osc2.connect(g2); osc3.connect(g3);
      g1.connect(gain); g2.connect(gain); g3.connect(gain);
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(volume * 0.3, now + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      [osc1,osc2,osc3].forEach(o => { o.start(now); o.stop(now + duration); });
      break;
    }

    case 'guitar': {
      const gain = audioCtx.createGain();
      gain.connect(out);
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      const src = audioCtx.createBufferSource();
      src.buffer = buf; src.loop = true;
      src.loopStart = 0; src.loopEnd = 1 / frequency;
      const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = frequency * 4;
      src.connect(lp); lp.connect(gain);
      gain.gain.setValueAtTime(volume * 0.9, now);
      gain.gain.exponentialRampToValueAtTime(volume * 0.4, now + 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.9);
      src.start(now); src.stop(now + duration);
      break;
    }

    case 'electric': {
      const gain = audioCtx.createGain();
      const ws = audioCtx.createWaveShaper();
      const curve = new Float32Array(256);
      for (let i = 0; i < 256; i++) { const x = (i*2/255)-1; curve[i] = (Math.PI+300)*x/(Math.PI+300*Math.abs(x)); }
      ws.curve = curve; ws.connect(out); gain.connect(ws);
      const osc = createOscWithType(frequency, 'sawtooth');
      const osc2 = createOscWithType(frequency, 'sawtooth', 6);
      const g2 = audioCtx.createGain(); g2.gain.value = 0.5;
      osc.connect(gain); osc2.connect(g2); g2.connect(gain);
      gain.gain.setValueAtTime(volume * 0.4, now);
      gain.gain.exponentialRampToValueAtTime(volume * 0.15, now + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      [osc, osc2].forEach(o => { o.start(now); o.stop(now + duration); });
      break;
    }

    case 'flute': {
      const gain = audioCtx.createGain(); gain.connect(out);
      const osc = createOscWithType(frequency, 'sine');
      const lfo = audioCtx.createOscillator(); lfo.frequency.value = 5;
      const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 4;
      lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
      const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
      const nd = noiseBuf.getChannelData(0);
      for (let i=0;i<nd.length;i++) nd[i] = (Math.random()*2-1)*0.05;
      const noise = audioCtx.createBufferSource(); noise.buffer = noiseBuf;
      const hp = audioCtx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=frequency*2;
      noise.connect(hp); hp.connect(gain); osc.connect(gain);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(volume, now + 0.06);
      gain.gain.setValueAtTime(volume, now + duration - 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      osc.start(now); osc.stop(now + duration);
      lfo.start(now); lfo.stop(now + duration);
      noise.start(now);
      break;
    }

    case 'organ': {
      const gain = audioCtx.createGain(); gain.connect(out);
      const harmonics = [1, 2, 3, 4, 6];
      const vols = [0.4, 0.3, 0.15, 0.1, 0.05];
      harmonics.forEach((h, idx) => {
        const o = createOscWithType(frequency * h, 'sine');
        const g = audioCtx.createGain(); g.gain.value = vols[idx];
        o.connect(g); g.connect(gain);
        o.start(now); o.stop(now + duration);
      });
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(volume, now + 0.01);
      gain.gain.setValueAtTime(volume, now + duration - 0.05);
      gain.gain.linearRampToValueAtTime(0, now + duration);
      break;
    }

    case 'marimba': {
      const gain = audioCtx.createGain(); gain.connect(out);
      const osc = createOscWithType(frequency, 'sine');
      const osc2 = createOscWithType(frequency * 4, 'sine');
      const g2 = audioCtx.createGain(); g2.gain.value = 0.1;
      osc.connect(gain); osc2.connect(g2); g2.connect(gain);
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.5);
      osc.start(now); osc.stop(now + duration);
      osc2.start(now); osc2.stop(now + duration * 0.3);
      break;
    }

    case 'strings': {
      const gain = audioCtx.createGain();
      const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=frequency*3; lp.Q.value=0.5;
      lp.connect(out); gain.connect(lp);
      [-8, 0, 8].forEach(det => {
        const o = createOscWithType(frequency, 'sawtooth', det);
        const g = audioCtx.createGain(); g.gain.value = 0.3;
        o.connect(g); g.connect(gain);
        o.start(now); o.stop(now + duration);
      });
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(volume, now + 0.25);
      gain.gain.setValueAtTime(volume, now + duration - 0.2);
      gain.gain.linearRampToValueAtTime(0, now + duration);
      break;
    }

    case 'synth': {
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter(); filter.type='lowpass'; filter.Q.value=8;
      filter.frequency.setValueAtTime(frequency * 1.5, now);
      filter.frequency.exponentialRampToValueAtTime(frequency * 8, now + 0.05);
      filter.frequency.exponentialRampToValueAtTime(frequency * 1.2, now + duration);
      filter.connect(out); gain.connect(filter);
      const osc = createOscWithType(frequency, 'square');
      const sub = createOscWithType(frequency * 0.5, 'sine');
      const sg = audioCtx.createGain(); sg.gain.value = 0.35;
      osc.connect(gain); sub.connect(sg); sg.connect(gain);
      gain.gain.setValueAtTime(volume * 0.8, now);
      gain.gain.exponentialRampToValueAtTime(volume * 0.5, now + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      osc.start(now); osc.stop(now + duration);
      sub.start(now); sub.stop(now + duration);
      break;
    }
  }
}

// Keyboard handling
const pressedKeys = new Set();
let sustain = false;

document.addEventListener('keydown', e => {
  // Sustain
  if (e.code === 'Space') {
    e.preventDefault();
    if (!sustain) {
      sustain = true;
      const si = document.getElementById('sustainIndicator');
      si.textContent = 'ON'; si.classList.add('on');
    }
    return;
  }

  // Octave shift via . and ,
  if (e.key === '.') { if (octaveShift < 2) { octaveShift++; updateOctaveDisplay(); } return; }
  if (e.key === ',') { if (octaveShift > -2) { octaveShift--; updateOctaveDisplay(); } return; }

  // S modifier → minor
  if (e.key === 's') {
    if (!sHeld) {
      sHeld = true;
      if (currentChord) {
        const root = currentChord.bassNote;
        currentChord = makeChord(root, 'minor');
        document.getElementById('chordDisplay').textContent = currentChord.name;
      }
      chordKeys.forEach(k => {
        document.getElementById('chord-name-'+k).textContent = makeChord(chordRoots[k], 'minor').name;
      });
    }
    return;
  }

  // Q modifier → dom7
  if (e.key === 'q') {
    e.preventDefault();
    if (!altHeld) {
      altHeld = true;
      if (currentChord) {
        const root = currentChord.bassNote;
        currentChord = makeChord(root, 'dom7');
        document.getElementById('chordDisplay').textContent = currentChord.name;
      }
      chordKeys.forEach(k => {
        document.getElementById('chord-name-'+k).textContent = makeChord(chordRoots[k], 'dom7').name;
      });
    }
    return;
  }

  heldKeys.add(e.key);

  // Left hand chord keys
  if (chordRoots[e.key] && e.key !== 's') {
    if (pressedKeys.has(e.key)) return;
    pressedKeys.add(e.key);
    const quality = altHeld ? 'dom7' : sHeld ? 'minor' : 'major';
    const root = chordRoots[e.key];
    currentChord = makeChord(root, quality);
    document.getElementById('chordDisplay').textContent = currentChord.name;
    // update UI label
    chordKeys.forEach(k => {
      const q = altHeld ? 'dom7' : sHeld ? 'minor' : 'major';
      document.getElementById('chord-name-'+k).textContent = makeChord(chordRoots[k], q).name;
    });
    document.querySelectorAll('.chord-key').forEach(el => el.classList.remove('pressed'));
    document.getElementById('chord-'+e.key).classList.add('pressed');
    const bFreq = bassFreq(baseFreqs[root]);
    const dur = sustain ? 4.0 : 1.2;
    playNote(bFreq, dur, 0.35);
    return;
  }

  // M = 扫弦：当前和弦所有音同时发声
  if (e.key === 'm') {
    if (!currentChord || pressedKeys.has('m')) return;
    pressedKeys.add('m');
    const melDur = sustain ? 3.5 : 0.8;
    currentChord.tones.forEach((n, idx) => {
      const f = baseFreqs[n] * Math.pow(2, octaveShift);
      // 略微错开时间模拟扫弦感
      setTimeout(() => playNote(f, melDur, 0.25), idx * 30);
    });
    return;
  }

  // Right hand melody
  if (rightKeys[e.key] && currentChord) {
    if (pressedKeys.has(e.key)) return;
    pressedKeys.add(e.key);
    const noteName = rightKeys[e.key];
    const snapped = currentChord.snap[noteName];
    const el = getMelodyEl(e.key);
    if (el) el.classList.add('pressed');
    const melDur = sustain ? 3.5 : 0.8;
    snapped.forEach(n => {
      let f;
      if (n.endsWith('_hi')) {
        f = baseFreqs[n.replace('_hi','')] * Math.pow(2, octaveShift + 1);
      } else {
        f = baseFreqs[n] * Math.pow(2, octaveShift);
      }
      playNote(f, melDur, 0.28);
    });
  }
});

document.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    sustain = false;
    const si = document.getElementById('sustainIndicator');
    si.textContent = 'OFF'; si.classList.remove('on');
    return;
  }
  if (e.key === 's') {
    sHeld = false;
    if (currentChord) {
      const root = currentChord.bassNote;
      currentChord = makeChord(root, altHeld ? 'dom7' : 'major');
      document.getElementById('chordDisplay').textContent = currentChord.name;
    }
    chordKeys.forEach(k => {
      document.getElementById('chord-name-'+k).textContent = makeChord(chordRoots[k], altHeld ? 'dom7' : 'major').name;
    });
    return;
  }
  if (e.key === 'q') {
    altHeld = false;
    if (currentChord) {
      const root = currentChord.bassNote;
      currentChord = makeChord(root, sHeld ? 'minor' : 'major');
      document.getElementById('chordDisplay').textContent = currentChord.name;
    }
    chordKeys.forEach(k => {
      document.getElementById('chord-name-'+k).textContent = makeChord(chordRoots[k], sHeld ? 'minor' : 'major').name;
    });
    return;
  }
  heldKeys.delete(e.key);
  pressedKeys.delete(e.key);
  if (e.key === 'm') return;
  if (chordRoots[e.key]) document.getElementById('chord-'+e.key)?.classList.remove('pressed');
  if (rightKeys[e.key]) getMelodyEl(e.key)?.classList.remove('pressed');
});

// Visualizer
const canvas = document.getElementById('visualizer');
const ctx2 = canvas.getContext('2d');
function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);

function drawVisualizer() {
  requestAnimationFrame(drawVisualizer);
  if (!analyser) return;
  analyser.getByteFrequencyData(analyserData);
  const W = canvas.width, H = canvas.height;
  ctx2.fillStyle = '#16161a';
  ctx2.fillRect(0, 0, W, H);
  const bars = analyserData.length;
  const bw = W / bars;
  for (let i = 0; i < bars; i++) {
    const v = analyserData[i] / 255;
    const h = v * H;
    const hue = 40 + i * 0.8;
    ctx2.fillStyle = `hsla(${hue}, 80%, 60%, ${0.6 + v * 0.4})`;
    ctx2.fillRect(i * bw, H - h, bw - 1, h);
  }
}
</script>
